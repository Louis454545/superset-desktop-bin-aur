name: Update AUR package

on:
  schedule:
    - cron: '0 */6 * * *' # check every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          LATEST=$(gh api repos/superset-sh/superset/releases/latest --jq '.tag_name' | sed 's/^desktop-v//')
          echo "current=$CURRENT_VER" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_VER" != "$LATEST" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
            SHA256=$(gh api repos/superset-sh/superset/releases/latest --jq \
              '[.assets[] | select(.name | test("x86_64.AppImage$"))][0].digest' \
              | sed 's/^sha256://')
            echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.update == 'true'
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.check.outputs.latest }}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.check.outputs.sha256 }}')/" PKGBUILD

      - name: Publish to AUR
        if: steps.check.outputs.update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: superset-desktop-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.check.outputs.latest }}"

      - name: Commit PKGBUILD update to this repo
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "Update to v${{ steps.check.outputs.latest }}"
          git push
